version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  postgres-db:
    image: postgres:15-alpine
    container_name: nextgen-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: checkout_db
      POSTGRES_USER: house
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. API Backend (Quarkus)
  checkout-backend:
    build:
      context: ./checkout-backend
      dockerfile: Dockerfile
    container_name: nextgen-backend
    ports:
      - "8087:8087"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres-db:5432/checkout_db
      - QUARKUS_DATASOURCE_USERNAME=house
      - QUARKUS_DATASOURCE_PASSWORD=password
      - QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION=update
    depends_on:
      - postgres-db

  # 3. Interface Visual Frontend (Angular)
  checkout-frontend:
    build:
      context: ./checkout-frontend
      dockerfile: Dockerfile
    container_name: nextgen-frontend
    ports:
      - "4200:4200"
    depends_on:
      - checkout-backend

volumes:
  postgres_data: